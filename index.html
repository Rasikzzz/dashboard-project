<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>📊 Business Dashboard</h1>

    <!-- GLOBAL INSIGHTS -->
    <div class="card">
      <h2>🌍 Global Insights</h2>
      <div id="global"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="card">
      <h2>🏆 Client Leaderboard</h2>

      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Client</th>
            <th>Total Orders</th>
            <th>Email Success %</th>
          </tr>
        </thead>

        <tbody id="leaderboard"></tbody>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>

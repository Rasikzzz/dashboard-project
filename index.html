<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail BPO · Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="dashboard">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-title">
                mail bpo
                <span class="version">v1 <span class="live-indicator"></span></span>
            </div>
            <div class="client-list" id="inspector-list">
                <!-- populated by JS -->
            </div>
            <div class="sidebar-footer">
                <span class="dot">●</span> <span id="total-orders-footer">0</span> orders
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">

            <!-- Header -->
            <div class="card header-card">
                <h1 id="page-title">overall</h1>
                <div class="header-meta">
                    <span class="meta" id="last-updated">updating…</span>
                    <span class="meta date-range" id="date-range"></span>
                </div>
            </div>

            <!-- KPI Grid -->
            <div class="card">
                <div class="card-header">
                    <span class="label">metrics</span>
                </div>
                <div class="metric-grid" id="kpi-grid">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- Charts Row -->
            <div class="chart-row">
                <div class="card chart-box">
                    <h4 id="stateChartTitle">top states</h4>
                    <div class="chart-container">
                        <canvas id="stateChart"></canvas>
                    </div>
                </div>
                <div class="card chart-box">
                    <h4 id="itemChartTitle">monthly trend</h4>
                    <div class="chart-container">
                        <canvas id="itemChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Monthly Trend (full width) -->
            <div class="card chart-box full-width">
                <h4 id="monthlyChartTitle">orders per month</h4>
                <div class="chart-container" style="height:180px;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <!-- Leaderboard Table -->
            <div class="card">
                <div class="card-header">
                    <span class="label" id="table-title">leaderboard</span>
                </div>
                <div style="overflow-x:auto;">
                    <table id="data-table">
                        <thead><tr></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
